<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><title>Attendance List</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="page-container">
        <div class="header-card">
            <h2>📋 Student Attendance List</h2>
            <p id="msg" class="msg info">Loading...</p>
        </div>

        <div class="table-wrapper">
            <table class="attendance-table">
                <thead>
                    <tr><th>Photo</th><th>Name</th><th>Reg No</th><th>Date</th><th>Time</th></tr>
                </thead>
                <tbody id="data"></tbody>
            </table>
        </div>

        <div class="footer-action">
            <button class="btn-back" onclick="location.href='teacher.html'">← Back to Teacher Dashboard</button>
            <button class="btn-back export" onclick="exportTableToCSV('Attendance.csv')">📥 Download CSV</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
