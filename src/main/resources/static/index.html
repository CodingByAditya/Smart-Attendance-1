<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Attendance - Student</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="center-page">
  <div class="card">
   

    <h1>🎓 Student Attendance</h1>

    <div class="form-grid">
      <input type="text" id="studentName" placeholder="Student Name"/>
      <input type="text" id="registrationNo" placeholder="Registration No"/>
    </div>

    <div class="datetime">
      <span id="date"></span> | <span id="time"></span>
    </div>

    <video id="video" autoplay playsinline></video>

    <div class="btn-row">
      <button onclick="startCamera()">Camera ON</button>
      <button onclick="stopCamera()">Camera OFF</button>
    </div>

    <button class="btn-wide" onclick="markAttendance()">✅ Mark Attendance</button>
    <p id="msg" class="msg info">Scan Teacher QR first.</p>

    <canvas id="canvas" style="display:none;"></canvas>
    <div id="photo-container" style="display:none; margin-top:12px;">
      <img id="photo" alt="Captured Photo"/>
    </div>
     <div class="top-nav">
        <a href="teacher.html" class="back-link">← Back to Teacher Dashboard</a>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
